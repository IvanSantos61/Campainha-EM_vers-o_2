<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; font-family: sans-serif; 
        }

        /* Variável de escala para manter tudo uniforme */
        :root { --scale: calc(min(90vw / 1920, 80vh / 1080)); }

        #main-layout {
            transform: scale(var(--scale));
            transform-origin: center center;
            display: flex; flex-direction: column; align-items: center;
        }

        #titulo-header { font-size: 60px; margin: 10px 0; color: #00ffff; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
        #status-bar { width: 1920px; padding: 20px; margin-bottom: 10px; color: #ff8800; text-align: center; font-size: 30px; border: 2px solid #333; background: rgba(0,0,0,0.8); box-sizing: border-box; }

        #game-wrapper {
            width: 1920px; height: 1080px;
            position: relative;
            background: url('ambiente.jpg') no-repeat center center; 
            background-size: contain;
        }

        /* Restante do CSS permanece igual para não afetar as coordenadas dos hotspots */
        #game-container { position: absolute; width: 1920px; height: 1080px; top: 0; left: 0; }
        .hotspot { position: absolute; background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff; cursor: pointer; z-index: 850; }
        #info-box { position: absolute; top: 5%; left: 35%; width: 30%; padding: 20px; background: rgba(0, 0, 0, 0.9); border: 4px solid #00ffff; color: #00ffff; display: none; z-index: 3000; border-radius: 15px; text-align: center; font-size: 25px; text-transform: uppercase; }
        .bolinha { width: 40px; height: 40px; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 4px solid white; z-index: 1000; }
        .conector { position: absolute; width: 100px; z-index: 999; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 990; cursor: pointer; width: 110px; }
        canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; z-index: 1; pointer-events: none; }
        
        #splash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #btn-iniciar { padding: 20px 40px; cursor: pointer; background: transparent; color: #00ffff; border: 2px solid #00ffff; font-size: 24px; border-radius: 50px; }
    </style>
</head>
<body>

    <div id="splash-overlay">
        <div id="splash-content" style="text-align:center; border: 2px solid #00ffff; padding: 40px;">
            <h1 class="neon-text">LABORATÓRIO SMT PRO</h1>
            <button id="btn-iniciar" class="neon-text">CLIQUE PARA INICIAR O LABORATÓRIO</button>
        </div>
    </div>

    <div id="main-layout">
        <h1 id="titulo-header">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">REDE: CLIQUE NA REFERÊNCIA INDICADA PARA INICIAR A PASSAGEM DO NEUTRO</div>
        
        <div id="game-wrapper">
            <div id="game-container">
                <div class="hotspot" style="top: 560px; left: 96px; width: 60px; height: 130px;" onmouseover="mostrarInfo('REDE ELÉTRICA')" onmouseout="esconderInfo()"></div>
                <div id="info-box"></div>
                <img id="btn_dg" src="al_dg_off.png" style="top: 280px; left: 230px;">
                <canvas id="canvasCabo" width="1920" height="1080"></canvas>
                <div id="bolinha1" class="bolinha"></div>
            </div>
        </div>
    </div>

    <script>
        /* A lógica permanece intacta e as coordenadas funcionam */
        function mostrarInfo(nome) { const box = document.getElementById('info-box'); box.innerText = nome; box.style.display = 'block'; }
        function esconderInfo() { document.getElementById('info-box').style.display = 'none'; }
        
        document.getElementById('btn-iniciar').onclick = () => { 
            document.getElementById('splash-overlay').style.display = 'none'; 
            iniciarCabo(); 
        };

        // ... Mantenha o restante da sua lógica JS original aqui ...
    </script>
</body>
</html>
