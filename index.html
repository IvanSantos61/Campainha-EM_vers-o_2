<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Estilos da Tela Splash */
        #tela-splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        #splash-content {
            border: 2px solid cyan; border-radius: 20px; padding: 40px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); color: cyan;
        }
        #splash-content h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; }
        #splash-content h2 { font-size: 2rem; margin: 10px 0; }
        #splash-content p { font-size: 1.5rem; margin: 20px 0; }
        #btn-iniciar {
            background: transparent; color: cyan; border: 2px solid cyan; padding: 15px 30px;
            font-size: 1.2rem; cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }
        #btn-iniciar:hover { background: cyan; color: black; }

        /* Estrutura do Painel (Oculto inicialmente) */
        #painel-principal { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* ... [Manter o CSS do Header e Game Container que já fizemos] ... */
        #header-container { width: 90vw; max-width: 1920px; text-align: center; margin-bottom: 15px; }
        #titulo-app { color: #00ffff; font-size: 3.5vw; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 0 0 10px #00ffff; }
        #status-bar { width: 100%; padding: 35px 20px; border: 2px solid #333; background: rgba(0,0,0,0.9); color: #ff8800; font-weight: bold; font-size: 1.2vw; border-radius: 4px; box-sizing: border-box; }
        #game-container { position: relative; width: 90vw; max-width: 1920px; aspect-ratio: 1920 / 1080; background: url('ambiente.jpg') no-repeat center center; background-size: contain; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bolinha { width: 2%; aspect-ratio: 1/1; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 2px solid white; z-index: 1000; }
        .conector { position: absolute; width: 5%; z-index: 999 !important; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 2000; cursor: pointer; width: 5%; }
    </style>
</head>
<body>

<div id="tela-splash">
    <div id="splash-content">
        <h1>LABORATÓRIO SMT PRO</h1>
        <h2>CAMPAINHA ELETROMAGNÉTICA</h2>
        <p>CIRCUITO MONOFÁSICO - 127V</p>
        <p style="font-size: 0.8rem; color: #555;">&copy; Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</p>
        <button id="btn-iniciar">CLIQUE PARA INICIAR O LABORATÓRIO</button>
    </div>
</div>

<div id="painel-principal">
    <div id="header-container">
        <h1 id="titulo-app">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">REDE: CLIQUE NA REFERÊNCIA INDICADA NO BARRAMENTO PARA INICIAR A PASSAGEM DO NEUTRO</div>
    </div>
    <div id="game-container">
        <img id="derivacao_fase2" class="conector" src="con_derivacao.png" style="top: 13.3%; left: 71%;">
        <img id="derivacao_neutro" class="conector" src="con_derivacao.png" style="top: 10.2%; left: 91.5%;">
        <img id="btn_dg" src="al_dg_off.png" style="top: 26%; left: 12%;">
        <img id="btn_dr" src="al_dr_off.png" style="top: 28.6%; left: 23.4%;">
        <img id="btn_int" src="tec_int_off.png" style="top: 67.8%; left: 63.5%;">
        <canvas id="canvasCabo" width="1920" height="1080"></canvas>
        <div id="bolinha1" class="bolinha"></div>
        <div id="bolinha2" class="bolinha"></div>
    </div>
</div>

<script>
    // Lógica para alternar entre as telas
    document.getElementById('btn-iniciar').onclick = () => {
        document.getElementById('tela-splash').style.display = 'none';
        document.getElementById('painel-principal').style.display = 'flex';
        iniciarCabo(); // Inicia o jogo apenas após clicar
    };

    // ... [Mantenha aqui a sua lógica de funcionamento dos cabos e teclas] ...
</script>
</body>
</html>
