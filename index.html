<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* Contêiner responsivo que mantém a proporção e centraliza o conteúdo */
        #app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Wrapper escalável: tudo aqui dentro redimensiona junto */
        #game-wrapper {
            width: 1920px;
            height: 1080px;
            transform-origin: center;
            transform: scale(calc(min(100vw / 1920, 100vh / 1080)));
            background: url('ambiente.jpg') no-repeat center;
            background-size: contain;
            position: relative;
        }

        #titulo, #status-bar { position: absolute; left: 0; width: 100%; text-align: center; color: white; font-family: sans-serif; }
        #titulo { top: 20px; font-size: 60px; }
        #status-bar { top: 100px; font-size: 30px; background: rgba(0,0,0,0.5); padding: 10px; }

        .bolinha { 
            position: absolute; width: 40px; height: 40px; border-radius: 50%; 
            border: 4px solid white; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="game-wrapper">
        <h1 id="titulo">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">Iniciando...</div>
        
        <div id="bolinha1" class="bolinha" style="display: none;"></div>
        <div id="bolinha2" class="bolinha" style="display: none;"></div>
    </div>
</div>

<script>
    const sequencia = ["FASE_REDE", "NEUTRO_REDE", "FASE_2", "RETORNO", "NEUTRO_2"];
    let indice = 0;
    
    // Configuração de coordenadas para cada cabo
    const cabosConfig = {
        "FASE_REDE": { b1: {x: 500, y: 400}, b2: {x: 1800, y: 200}, cor: "red" },
        // Adicione as outras coordenadas aqui...
    };

    const b1 = document.getElementById('bolinha1');
    const b2 = document.getElementById('bolinha2');
    const status = document.getElementById('status-bar');

    function iniciarCabo() {
        const nomeCabo = sequencia[indice];
        if (!nomeCabo) { status.innerText = "Laboratório Concluído!"; return; }
        
        status.innerText = `Cabo: ${nomeCabo} - Clique na bolinha inicial.`;
        const cfg = cabosConfig[nomeCabo];

        b1.style.display = "block";
        b1.style.backgroundColor = cfg.cor;
        b1.style.left = cfg.b1.x + "px";
        b1.style.top = cfg.b1.y + "px";
        b2.style.display = "none";

        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            b2.style.display = "block";
            b2.style.backgroundColor = cfg.cor;
            b2.style.left = cfg.b2.x + "px";
            b2.style.top = cfg.b2.y + "px";
            status.innerText = `Cabo: ${nomeCabo} - Agora clique na bolinha final.`;
        };

        b2.onclick = () => {
            status.innerText = `Cabo ${nomeCabo} finalizado!`;
            indice++;
            iniciarCabo();
        };
    }

    iniciarCabo();
</script>

</body>
</html>
